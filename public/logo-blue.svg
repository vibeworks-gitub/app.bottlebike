<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Bottle Bike Logo">
  <title>Bottle Bike</title>
  <desc>Logo mit zwei PET-Flaschen im Kreis und Schriftzug "bottle bike" — Gletscher-Blau</desc>

  <!-- Kreis -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#0284C7" stroke-width="2.5"/>

  <!-- Flaschen-Gruppe -->
  <g transform="translate(143.3, 100) scale(2.1)" stroke-linejoin="round" stroke-linecap="round">

    <!-- LINKE: VOLL mit Etikett-Lücken -->
    <path d="M 9 0 L 15 0 Q 16 0 16 1 L 16 4 L 16.7 4 L 16.7 5 L 16 5 L 16 8 C 16 13 22 13 24 17 L 24 59 Q 24 65 18 65 L 6 65 Q 0 65 0 59 L 0 17 C 2 13 8 13 8 8 L 8 5 L 7.3 5 L 7.3 4 L 8 4 L 8 1 Q 8 0 9 0 Z M 0 28.5 L 24 28.5 L 24 29.5 L 0 29.5 Z M 0 41.5 L 24 41.5 L 24 42.5 L 0 42.5 Z" fill-rule="evenodd" fill="#0284C7"/>

    <!-- RECHTE: OUTLINE -->
    <g transform="translate(30, 0)" fill="none" stroke="#0284C7" stroke-width="1.2">
      <path d="M 9 0 L 15 0 Q 16 0 16 1 L 16 4 L 16.7 4 L 16.7 5 L 16 5 L 16 8 C 16 13 22 13 24 17 L 24 59 Q 24 65 18 65 L 6 65 Q 0 65 0 59 L 0 17 C 2 13 8 13 8 8 L 8 5 L 7.3 5 L 7.3 4 L 8 4 L 8 1 Q 8 0 9 0 Z"/>
      <line x1="0" y1="29" x2="24" y2="29"/>
      <line x1="0" y1="42" x2="24" y2="42"/>
    </g>
  </g>

  <!-- Wortmarke -->
  <text x="200" y="300" font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="-1.6" fill="#0284C7" text-anchor="middle">bottle bike</text>
</svg>
