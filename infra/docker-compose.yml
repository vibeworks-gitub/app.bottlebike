services:
  app:
    image: bottlebike-app:latest
    container_name: bottlebike-app
    restart: unless-stopped
    env_file: .env
    networks:
      - web
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  web:
    external: true
